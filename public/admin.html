<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - TechParallax</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --primary-blue: #2563eb;
        --electric-blue: #3b82f6;
        --dark-blue: #1e40af;
        --tech-gray: #0f172a;
        --card-bg: #1e293b;
        --accent: #06b6d4;
        --text-light: #f8fafc;
        --text-gray: #94a3b8;
        --success: #10b981;
      }

      body {
        background: var(--tech-gray);
        color: var(--text-light);
        font-family: "Inter", "Segoe UI", sans-serif;
        min-height: 100vh;
        margin: 0;
        padding: 0;
      }

      .admin-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }

      .admin-header {
        background: linear-gradient(135deg, var(--tech-gray), var(--dark-blue));
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 2rem 0;
        margin-bottom: 2rem;
      }

      .admin-card {
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        margin-bottom: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .admin-card-header {
        background: linear-gradient(135deg, var(--card-bg), var(--dark-blue));
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 1.5rem;
        color: var(--text-light);
      }

      .admin-card-body {
        padding: 2rem;
      }

      .form-control,
      .form-select {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: var(--text-light);
        padding: 12px 16px;
        transition: all 0.3s ease;
      }

      .form-control:focus,
      .form-select:focus {
        background: rgba(15, 23, 42, 1);
        border-color: var(--electric-blue);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        color: var(--text-light);
      }

      .form-control::placeholder {
        color: var(--text-gray);
      }

      .form-label {
        color: var(--text-light);
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      .form-text {
        color: var(--text-gray);
        font-size: 0.875rem;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--electric-blue),
          var(--dark-blue)
        );
        border: none;
        border-radius: 10px;
        padding: 12px 24px;
        font-weight: 600;
        transition: all 0.3s ease;
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        color: white;
      }

      .btn-success {
        background: linear-gradient(135deg, var(--success), #059669);
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-weight: 500;
        transition: all 0.3s ease;
        color: white;
        font-size: 0.875rem;
      }

      .btn-success:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        color: white;
      }

      .btn-danger {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-weight: 500;
        transition: all 0.3s ease;
        color: white;
        font-size: 0.875rem;
      }

      .btn-danger:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        color: white;
      }

      .table {
        color: var(--text-light);
        margin-bottom: 0;
        width: 100%;
      }

      .table th {
        background: var(--card-bg);
        border-color: rgba(255, 255, 255, 0.1);
        color: var(--electric-blue);
        font-weight: 600;
        padding: 1rem;
        font-size: 0.9rem;
      }

      .table td {
        border-color: rgba(255, 255, 255, 0.1);
        padding: 1rem;
        vertical-align: middle;
        font-size: 0.875rem;
      }

      .table-striped tbody tr:nth-of-type(odd) {
        background-color: rgba(255, 255, 255, 0.05);
      }

      .table-striped tbody tr:hover {
        background-color: rgba(59, 130, 246, 0.1);
      }

      .admin-brand {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(
          135deg,
          var(--electric-blue),
          var(--accent)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0;
      }

      .admin-message {
        border-radius: 10px;
        margin-bottom: 1rem;
        border: none;
      }

      .price-input,
      .stock-input {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-light);
        max-width: 120px;
        padding: 8px 12px;
        border-radius: 6px;
      }

      .price-input:focus,
      .stock-input:focus {
        background: rgba(15, 23, 42, 1);
        border-color: var(--electric-blue);
        color: var(--text-light);
      }

      .category-badge {
        background: rgba(59, 130, 246, 0.2);
        color: var(--electric-blue);
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .action-buttons {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .stats-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .stat-card {
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 1.5rem;
        text-align: center;
      }

      .stat-number {
        font-size: 2rem;
        font-weight: 700;
        color: var(--electric-blue);
        margin-bottom: 0.5rem;
      }

      .stat-label {
        color: var(--text-gray);
        font-size: 0.9rem;
      }

      @media (max-width: 768px) {
        .admin-container {
          padding: 1rem;
        }

        .action-buttons {
          flex-direction: column;
        }

        .stats-cards {
          grid-template-columns: 1fr;
        }

        .table-responsive {
          font-size: 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="admin-header">
      <div class="admin-container">
        <div
          class="d-flex justify-content-between align-items-center flex-wrap gap-3"
        >
          <h1 class="admin-brand">
            <i class="fas fa-microchip me-2"></i>
            TechBD Admin
          </h1>
          <a href="/" class="btn btn-outline-primary">
            <i class="fas fa-store me-1"></i>
            Back to Store
          </a>
        </div>
      </div>
    </div>

    <div class="admin-container">
      <!-- Statistics Cards -->
      <div class="stats-cards">
        <div class="stat-card">
          <div class="stat-number" id="totalProducts">0</div>
          <div class="stat-label">Total Products</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="totalOrders">0</div>
          <div class="stat-label">Total Orders</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="lowStock">0</div>
          <div class="stat-label">Low Stock Items</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">৳<span id="totalRevenue">0</span></div>
          <div class="stat-label">Total Revenue</div>
        </div>
      </div>

      <div class="admin-card">
        <div class="admin-card-header">
          <h5 class="mb-0">
            <i class="fas fa-plus-circle me-2"></i>Add New Product
          </h5>
        </div>
        <div class="admin-card-body">
          <form id="addProductForm" enctype="multipart/form-data">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="productTitle" class="form-label"
                  >Product Name</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="productTitle"
                  placeholder="Enter product name"
                  required
                />
              </div>
              <div class="col-md-3">
                <label for="productPrice" class="form-label">Price (৳)</label>
                <input
                  type="number"
                  class="form-control"
                  id="productPrice"
                  placeholder="0.00"
                  min="0"
                  step="0.01"
                  required
                />
              </div>
              <div class="col-md-3">
                <label for="productStock" class="form-label"
                  >Stock Quantity</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="productStock"
                  placeholder="0"
                  min="0"
                  required
                />
              </div>
              <div class="col-md-6">
                <label for="productCategory" class="form-label">Category</label>
                <select class="form-select" id="productCategory" required>
                  <option value="">Select Category</option>
                  <option value="Audio">Audio</option>
                  <option value="Wearables">Wearables</option>
                  <option value="Gaming">Gaming</option>
                  <option value="Accessories">Accessories</option>
                  <option value="Computers">Computers</option>
                  <option value="Phones">Phones</option>
                  <option value="Tablets">Tablets</option>
                  <option value="Cameras">Cameras</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="productCurrency" class="form-label">Currency</label>
                <input
                  type="text"
                  class="form-control"
                  id="productCurrency"
                  value="BDT"
                  readonly
                />
              </div>
              <div class="col-12">
                <label for="productImageFile" class="form-label"
                  >Product Image</label
                >
                <input
                  type="file"
                  class="form-control"
                  id="productImageFile"
                  accept="image/*"
                  required
                />
                <div class="form-text">
                  Upload a product image (JPEG, PNG, WebP - max 5MB)
                </div>
              </div>
              <div class="col-12">
                <label for="productDescription" class="form-label"
                  >Product Description</label
                >
                <textarea
                  class="form-control"
                  id="productDescription"
                  placeholder="Enter product description"
                  rows="4"
                ></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary w-100">
                  <i class="fas fa-plus me-1"></i>
                  Add Product
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="admin-card">
        <div
          class="admin-card-header d-flex justify-content-between align-items-center flex-wrap gap-2"
        >
          <h5 class="mb-0"><i class="fas fa-cogs me-2"></i>Manage Products</h5>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-primary btn-sm" id="refreshProducts">
              <i class="fas fa-sync-alt me-1"></i>Refresh
            </button>
          </div>
        </div>
        <div class="admin-card-body">
          <div class="table-responsive">
            <table class="table table-striped">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Category</th>
                  <th>Price (৳)</th>
                  <th>Stock</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="productsTable">
                <!-- Products will be loaded here -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
